{% extends 'store/base.html' %}

{% block content %}
<style>
    .profile-card input, .profile-card textarea {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        margin-bottom: 15px;
    }
    .profile-card label {
        font-weight: bold;
        margin-bottom: 5px;
        color: #495057;
    }
</style>

<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 profile-card">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">Thông tin cá nhân</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="">
                    {% csrf_token %}
                    
                    {{ user_form.as_p }}
                    {{ profile_form.as_p }}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Cập nhật thông tin</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="{% url 'home' %}" class="text-decoration-none">← Quay lại trang chủ</a>
        </div>
    </div>
</div>
{% endblock %}
